name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: BASE_URL
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    # - name: Install Allure CLI
    #   run: npm install -g allure-commandline

    - name: Run Playwright tests
      run: npx playwright test
      env:
        BASE_URL: ${{ vars.CMS_BASE_URL }}   # ✅ KEY FIX: BASE_URL not CMS_BASE_URL
      continue-on-error: true

    - name: Generate Allure Single File Report
      run: allure generate allure-results --clean --single-file -o allure-report
      if: always()

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Allure Single File Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-report
        path: allure-report/index.html
        retention-days: 30

    - name: Upload Allure Results (raw)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: allure-results/
        retention-days: 30